<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile · Profil Operatora</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #050410;
  --gold: #e8c878; --gold-soft: #a88850; --gold-dim: rgba(232,200,120,0.12);
  --violet: #8a5ac0; --violet-dim: rgba(138,90,192,0.15);
  --ink: #f0e8d8; --ink-dim: rgba(240,232,216,0.55); --ink-faint: rgba(240,232,216,0.22);
  --border: rgba(240,232,216,0.08);
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; background: var(--deep); color: var(--ink); font-family: var(--serif); -webkit-font-smoothing: antialiased; }

body {
  background:
    radial-gradient(ellipse 55% 35% at 30% 20%, rgba(138,90,192,0.10), transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 80%, rgba(232,200,120,0.06), transparent 70%),
    var(--deep);
}

/* ── LAYOUT ── */
.page { max-width: 780px; margin: 76px auto 28px; padding: 40px 32px 60px; }

/* ── RADAR PLACEHOLDER ── */
.radar-wrap {
  display: flex; align-items: center; justify-content: center;
  gap: 48px; flex-wrap: wrap; margin-bottom: 56px;
}
.radar-svg { opacity: 0.35; }

.axes-list {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px 32px;
}
.axis-item {
  display: flex; align-items: center; gap: 10px;
}
.axis-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--violet); flex-shrink: 0;
  box-shadow: 0 0 6px rgba(138,90,192,0.5);
}
.axis-name { font-family: var(--mono); font-size: 8px; letter-spacing: 0.22em; color: var(--ink-dim); text-transform: uppercase; }

/* ── COMING ── */
.coming {
  text-align: center;
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.32em;
  color: var(--ink-faint); text-transform: uppercase;
  border: 1px solid var(--border); padding: 18px 28px; display: inline-block;
}
.coming-wrap { text-align: center; }
</style>
<style>
.hud-top{position:fixed;top:0;left:0;right:0;z-index:500;height:76px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;gap:0;background:linear-gradient(180deg,rgba(5,4,16,.94) 0%,rgba(5,4,16,0) 100%);backdrop-filter:blur(4px);border-bottom:1px solid rgba(232,200,120,.06);}
.hud-l,.hud-r{display:flex;align-items:center;gap:6px;overflow:hidden;min-width:0;}
.hud-r{justify-content:flex-end;}
.hud-c{text-align:center;padding:0 12px;}
.hud-brand{font-family:var(--sans);font-size:9px;font-weight:500;color:rgba(232,200,120,.45);letter-spacing:.5em;text-transform:uppercase;line-height:1;}
.hud-mod{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-top:5px;line-height:1;}
.hud-sub{font-family:var(--serif);font-size:11px;font-style:italic;color:rgba(200,180,140,.4);letter-spacing:.04em;margin-top:4px;line-height:1;}
.hud-btn{background:transparent;border:1px solid rgba(232,200,120,.15);color:rgba(240,232,216,.5);font-family:var(--mono);font-size:8.5px;letter-spacing:.25em;text-transform:uppercase;padding:8px 12px;cursor:pointer;text-decoration:none;transition:all .25s;display:inline-flex;align-items:center;line-height:1;}
.hud-btn:hover{border-color:rgba(232,200,120,.5);color:var(--gold);background:rgba(232,200,120,.04);}
.hud-bot{position:fixed;bottom:0;left:0;right:0;z-index:500;height:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(0deg,rgba(5,4,16,.88) 0%,rgba(5,4,16,0) 100%);backdrop-filter:blur(2px);border-top:1px solid rgba(232,200,120,.03);}
.hud-bot-meta{font-family:var(--mono);font-size:7px;letter-spacing:.2em;color:rgba(240,232,216,.15);text-transform:uppercase;}
</style>
</head>
<body>
<header class="hud-top">
  <div class="hud-l">
    <a class="hud-btn" href="../../../index.html">⟵ mapa</a>
  </div>
  <div class="hud-c">
    <div class="hud-brand">AI·WHISPERERS</div>
    <div class="hud-mod">Profile</div>
    <div class="hud-sub">profil operatora · radar dziewięciu osi</div>
  </div>
  <div class="hud-r"></div>
</header>


<div class="page">

  <div class="radar-wrap">
    <!-- radar szkielet SVG -->
    <svg class="radar-svg" width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(110,110)">
        <!-- siatka -->
        <polygon points="0,-90 85,-28 53,73 -53,73 -85,-28" fill="none" stroke="rgba(138,90,192,0.4)" stroke-width="0.8"/>
        <polygon points="0,-60 57,-18 35,48 -35,48 -57,-18" fill="none" stroke="rgba(138,90,192,0.25)" stroke-width="0.6"/>
        <polygon points="0,-30 28,-9 18,24 -18,24 -28,-9" fill="none" stroke="rgba(138,90,192,0.15)" stroke-width="0.5"/>
        <!-- osie (9) -->
        <line x1="0" y1="0" x2="0" y2="-90" stroke="rgba(232,200,120,0.2)" stroke-width="0.6"/>
        <line x1="0" y1="0" x2="85" y2="-28" stroke="rgba(232,200,120,0.2)" stroke-width="0.6"/>
        <line x1="0" y1="0" x2="53" y2="73" stroke="rgba(232,200,120,0.2)" stroke-width="0.6"/>
        <line x1="0" y1="0" x2="-53" y2="73" stroke="rgba(232,200,120,0.2)" stroke-width="0.6"/>
        <line x1="0" y1="0" x2="-85" y2="-28" stroke="rgba(232,200,120,0.2)" stroke-width="0.6"/>
        <!-- placeholder data -->
        <polygon points="0,-70 62,-20 38,55 -40,50 -72,-22" fill="rgba(138,90,192,0.12)" stroke="rgba(138,90,192,0.5)" stroke-width="1"/>
      </g>
    </svg>

    <div class="axes-list">
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Lustro</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Klej</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Zakorzeniony</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Tarcie</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Rezonans</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Cisza</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Gęstość</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Iskra</span></div>
      <div class="axis-item"><div class="axis-dot"></div><span class="axis-name">Tryb</span></div>
    </div>
  </div>

  <div class="coming-wrap">
    <div class="coming">w budowie · pobiera dane z AiWPass</div>
  </div>
</div>

<!-- HUD-BOT -->
<footer class="hud-bot">
  <span class="hud-bot-meta">Profile · v1.0 · Claude Sonnet 4.6 · © Denis Czuliński · iFactory5.0 · 2026</span>
</footer>

</body>
</html>
