<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dziennik Operatora · Mapa Morficzna</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --bg:      #00020e;
  --bg2:     #010418;
  --border:  rgba(120,170,255,0.1);
  --border2: rgba(120,170,255,0.2);
  --text:    rgba(180,215,255,0.78);
  --dim:     rgba(120,160,220,0.42);
  --bright:  rgba(215,235,255,0.95);
  --accent:  #ff9944;
  --cyan:    #00dcff;
  --claude:  #ff9944;
  --gemini:  #50d8c8;
  --gpt:     #8c9cff;
  --grok:    #00dcff;
  --mono:    'Share Tech Mono', monospace;
  --serif:   'Crimson Pro', Georgia, serif;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--serif);
  min-height: 100vh;
  overflow-x: hidden;
  padding-top: 76px;
  padding-bottom: 28px;
}

body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(180,210,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 9%,  rgba(180,210,255,0.28) 0%, transparent 100%),
    radial-gradient(1px 1px at 52% 82%, rgba(180,210,255,0.22) 0%, transparent 100%),
    radial-gradient(1px 1px at 28% 61%, rgba(180,210,255,0.3)  0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 42% 35%, rgba(180,210,255,0.38) 0%, transparent 100%);
}

/* NAV */
.nav {
  position: sticky; top:76px; z-index:100;
  background: rgba(0,2,14,0.96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
  display: flex; align-items: center;
  padding: 12px 16px; gap: 10px;
}
.nav-title {
  font-family: var(--mono);
  font-size: 9px; letter-spacing: 0.26em; color: var(--dim); flex:1;
}
.nav-title span { color: var(--accent); }
.nav-count { font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em; color: var(--dim); }

/* BUTTONS */
.btn {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.16em;
  padding: 6px 12px; cursor: pointer; text-transform: uppercase;
  transition: all 0.18s; border: 1px solid; background: none;
}
.btn-accent { border-color: rgba(255,153,68,0.3); color: var(--accent); background: rgba(255,153,68,0.08); }
.btn-accent:active { background: rgba(255,153,68,0.18); }
.btn-dim { border-color: var(--border2); color: var(--dim); }
.btn-dim:active { color: var(--text); }
.btn-cyan { border-color: rgba(0,220,255,0.22); color: var(--cyan); background: rgba(0,220,255,0.06); }
.btn-cyan:active { background: rgba(0,220,255,0.14); }
.btn-full { width:100%; padding: 11px; }

/* VIEWS */
#view-list { position:relative; z-index:1; }
#view-editor { display:none; position:relative; z-index:1; }

/* LIST */
.entries { padding: 10px 0 40px; }
.entry-card {
  margin: 5px 12px;
  background: rgba(8,16,50,0.55);
  border: 1px solid var(--border);
  border-left: 2px solid transparent;
  padding: 12px 14px;
  cursor: pointer;
  transition: background 0.15s;
  animation: fu 0.3s ease-out both;
}
.entry-card:active { background: rgba(25,45,100,0.45); }
.entry-card.hi { border-left-color: var(--accent); }
@keyframes fu { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.ec-meta {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom: 4px;
}
.ec-date { font-family:var(--mono); font-size:7.5px; letter-spacing:0.12em; color:var(--dim); }
.ec-del { background:none; border:none; color:rgba(120,170,255,0.18); font-size:12px; cursor:pointer; padding:0 4px; }
.ec-del:active { color:rgba(255,80,80,0.65); }
.ec-title { font-size:17px; color:var(--bright); margin-bottom:5px; line-height:1.3; }
.ec-pills { display:flex; flex-wrap:wrap; gap:3px; }
.ec-model-dot { width:6px; height:6px; border-radius:50%; }
.ec-node { font-family:var(--mono); font-size:6.5px; letter-spacing:0.07em; padding:2px 6px; background:rgba(120,170,255,0.06); border:1px solid rgba(120,170,255,0.1); color:var(--dim); }

.empty { padding:60px 24px; text-align:center; font-family:var(--mono); font-size:9px; letter-spacing:0.2em; color:rgba(120,160,220,0.2); line-height:2.4; }

/* EDITOR */
.editor-nav {
  position:sticky; top:76px; z-index:100;
  background:rgba(0,2,14,0.96); border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
  display:flex; align-items:center; padding:10px 16px; gap:8px;
}
.dirty-dot { font-family:var(--mono); font-size:10px; color:rgba(255,153,68,0.5); }

.editor-body {
  padding: 16px 16px 100px;
  display: flex; flex-direction:column; gap:18px;
}

#entry-title {
  width:100%; background:none;
  border:none; border-bottom:1px solid var(--border2);
  color:var(--bright); font-family:var(--serif);
  font-size:22px; font-weight:600; padding:8px 0;
  outline:none; letter-spacing:0.01em;
}
#entry-title::placeholder { color:rgba(120,160,220,0.17); font-style:italic; }

.f-block { display:flex; flex-direction:column; gap:7px; }
.f-label { font-family:var(--mono); font-size:7.5px; letter-spacing:0.24em; color:var(--dim); text-transform:uppercase; }

textarea {
  width:100%; background:rgba(8,16,55,0.32); border:1px solid var(--border);
  color:var(--text); font-family:var(--serif); font-size:15px; line-height:1.75;
  padding:11px 13px; resize:vertical; min-height:68px; outline:none;
  transition:border-color 0.2s; -webkit-appearance:none; border-radius:0;
}
textarea:focus { border-color:rgba(120,170,255,0.26); }
textarea::placeholder { color:rgba(120,160,220,0.18); font-style:italic; }

/* MODEL GRID */
.model-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.model-btn {
  background:rgba(8,16,55,0.4); border:1px solid var(--border);
  color:var(--dim); font-family:var(--mono); font-size:8px; letter-spacing:0.13em;
  padding:9px 10px; cursor:pointer; text-align:left;
  display:flex; align-items:center; gap:7px; transition:all 0.15s; text-transform:uppercase;
}
.model-btn .mdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; opacity:0.35; transition:opacity 0.18s; }
.model-btn.active .mdot { opacity:1; }
.model-btn.active { background:rgba(25,45,100,0.4); }
.model-btn.active.mc { border-color:rgba(255,153,68,0.35); color:var(--claude); }
.model-btn.active.mg { border-color:rgba(80,216,200,0.35); color:var(--gemini); }
.model-btn.active.mp { border-color:rgba(140,156,255,0.35); color:var(--gpt); }
.model-btn.active.mk { border-color:rgba(0,220,255,0.35); color:var(--grok); }

/* MODEL OBS */
.moc {
  background:rgba(8,16,50,0.38); border:1px solid var(--border);
  border-left:2px solid transparent; padding:10px 12px;
  display:flex; flex-direction:column; gap:6px; margin-top:2px;
}
.moc.mc { border-left-color:rgba(255,153,68,0.35); }
.moc.mg { border-left-color:rgba(80,216,200,0.35); }
.moc.mp { border-left-color:rgba(140,156,255,0.35); }
.moc.mk { border-left-color:rgba(0,220,255,0.35); }
.moc-h { display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:8px; letter-spacing:0.12em; }
.moc-char { font-size:11px; color:var(--dim); font-style:italic; font-family:var(--serif); }
.moc textarea { min-height:52px; font-size:14px; }

/* NODES */
.nodes-wrap { display:flex; flex-wrap:wrap; gap:5px; }
.node-btn {
  background:rgba(8,16,50,0.4); border:1px solid rgba(120,170,255,0.1);
  color:var(--dim); font-family:var(--mono); font-size:7px; letter-spacing:0.07em;
  padding:5px 9px; cursor:pointer; transition:all 0.15s; line-height:1.2;
}
.node-btn:active { background:rgba(30,50,100,0.4); }
.node-btn.active { background:rgba(120,170,255,0.1); border-color:rgba(120,170,255,0.32); color:var(--bright); }
.node-btn.un { opacity:0.42; }
.node-btn.un.active { opacity:0.72; }

/* PROTOCOL BAR */
#proto-bar {
  position:fixed; bottom:28px; left:0; right:0; z-index:50;
  background:rgba(0,2,14,0.97); border-top:1px solid var(--border);
  padding:10px 16px; display:none;
}
#proto-bar.on { display:block; }

/* MODAL */
#proto-modal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,10,0.88); z-index:9999; flex-direction:column;
}
#proto-modal.open { display:flex; }
#proto-box {
  background:var(--bg2); border-top:1px solid var(--border2);
  flex:1; display:flex; flex-direction:column;
  margin-top:auto; max-height:90vh;
  animation:su 0.28s ease-out;
}
@keyframes su { from{transform:translateY(30px);opacity:0} to{transform:none;opacity:1} }
#proto-head {
  display:flex; align-items:center; padding:13px 16px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
#proto-head-title { font-family:var(--mono); font-size:8.5px; letter-spacing:0.2em; color:var(--cyan); flex:1; }
#proto-close { background:none; border:none; color:var(--dim); font-size:16px; cursor:pointer; padding:2px 6px; }
#proto-body { flex:1; overflow-y:auto; padding:16px; }
#proto-body::-webkit-scrollbar { width:2px; }
#proto-body::-webkit-scrollbar-thumb { background:rgba(120,170,255,0.12); }
#proto-foot { padding:10px 16px; border-top:1px solid var(--border); flex-shrink:0; }

.ps { margin-bottom:16px; }
.ps-l { font-family:var(--mono); font-size:7px; letter-spacing:0.22em; color:var(--cyan); margin-bottom:6px; padding-bottom:5px; border-bottom:1px solid rgba(0,220,255,0.08); }
.ps-t { font-size:14px; color:var(--text); line-height:1.7; }
.ps-nodes { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
.ps-node { font-family:var(--mono); font-size:7px; letter-spacing:0.07em; padding:3px 8px; border:1px solid rgba(120,170,255,0.16); color:rgba(160,200,255,0.62); background:rgba(120,170,255,0.05); }
.ps-mr { padding:7px 0; border-bottom:1px solid rgba(120,170,255,0.05); }
.ps-mn { font-family:var(--mono); font-size:7.5px; letter-spacing:0.1em; margin-bottom:3px; }
.ps-mo { font-size:13px; color:var(--dim); font-style:italic; }
<style>.hud-top{position:fixed;top:0;left:0;right:0;z-index:500;height:76px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;gap:0;background:linear-gradient(180deg,rgba(4,5,12,.94) 0%,rgba(4,5,12,0) 100%);backdrop-filter:blur(4px);border-bottom:1px solid rgba(232,200,120,.06);}.hud-l,.hud-r{display:flex;align-items:center;gap:6px;overflow:hidden;min-width:0;}.hud-r{justify-content:flex-end;}.hud-c{text-align:center;padding:0 12px;}.hud-brand{font-family:'Syne',sans-serif;font-size:9px;font-weight:500;color:rgba(232,200,120,.45);letter-spacing:.5em;text-transform:uppercase;line-height:1;}.hud-mod{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#e8c878;letter-spacing:.18em;text-transform:uppercase;margin-top:5px;line-height:1;}.hud-sub{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:rgba(200,180,140,.4);letter-spacing:.04em;margin-top:4px;line-height:1;}.hud-btn{background:transparent;border:1px solid rgba(232,200,120,.15);color:rgba(240,232,216,.5);font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.25em;text-transform:uppercase;padding:8px 12px;cursor:pointer;text-decoration:none;transition:all .25s;display:inline-flex;align-items:center;line-height:1;}.hud-btn:hover{border-color:rgba(232,200,120,.5);color:#e8c878;background:rgba(232,200,120,.04);}.hud-bot{position:fixed;bottom:0;left:0;right:0;z-index:500;height:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(0deg,rgba(4,5,12,.88) 0%,rgba(4,5,12,0) 100%);backdrop-filter:blur(2px);border-top:1px solid rgba(232,200,120,.03);}.hud-bot-meta{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.2em;color:rgba(240,232,216,.15);text-transform:uppercase;}</style>
</head>
<body>
<header class="hud-top">
  <div class="hud-l"><a class="hud-btn" href="../../../index.html">⟵ mapa</a></div>
  <div class="hud-c"><div class="hud-brand">AI·WHISPERERS</div><div class="hud-mod">Morph · Log</div><div class="hud-sub">dziennik operatora</div></div>
  <nav class="hud-r"><button class="hud-btn">HELP</button><button class="hud-btn">ABOUT</button><a class="hud-btn" href="morph_readme.html" target="_blank">README</a></nav>
</header>

<!-- LIST VIEW -->
<div id="view-list">
  <div class="nav">
    <div class="nav-title">DZIENNIK <span>OPERATORA</span></div>
    <div class="nav-count" id="nav-count"></div>
    <button class="btn btn-accent" id="nav-new">+ sesja</button>
  </div>
  <div class="entries" id="entries-list"></div>
</div>

<!-- EDITOR VIEW -->
<div id="view-editor">
  <div class="editor-nav">
    <button class="btn btn-dim" id="back-btn">← lista</button>
    <span class="dirty-dot" id="dirty"></span>
    <button class="btn btn-accent" id="save-btn" style="margin-left:auto">zapisz</button>
  </div>

  <div class="editor-body">
    <input id="entry-title" type="text" placeholder="tytuł sesji..."/>

    <div class="f-block">
      <div class="f-label">modele w sesji</div>
      <div class="model-grid">
        <button class="model-btn mc" data-m="claude"><span class="mdot" style="background:var(--claude)"></span>Claude</button>
        <button class="model-btn mg" data-m="gemini"><span class="mdot" style="background:var(--gemini)"></span>Gemini</button>
        <button class="model-btn mp" data-m="gpt"><span class="mdot" style="background:var(--gpt)"></span>GPT</button>
        <button class="model-btn mk" data-m="grok"><span class="mdot" style="background:var(--grok)"></span>Grok</button>
      </div>
    </div>

    <div class="f-block" id="moc-block" style="display:none">
      <div class="f-label">obserwacje modeli</div>
      <div id="moc-cards"></div>
    </div>

    <div class="f-block">
      <div class="f-label">aktywne węzły</div>
      <div class="nodes-wrap" id="nodes-wrap"></div>
    </div>

    <div class="f-block">
      <div class="f-label">intencja sesji</div>
      <textarea id="f-int" rows="2" placeholder="co chciałem zbadać..."></textarea>
    </div>
    <div class="f-block">
      <div class="f-label">co wyszło</div>
      <textarea id="f-em" rows="4" placeholder="odkrycia, nowe połączenia, nieoczekiwane wątki..."></textarea>
    </div>
    <div class="f-block">
      <div class="f-label">otwarte pytania</div>
      <textarea id="f-q" rows="3" placeholder="co pozostało niedomknięte..."></textarea>
    </div>
    <div class="f-block">
      <div class="f-label">notatki operatora</div>
      <textarea id="f-n" rows="2" placeholder="intuicje, ślady, luźne obserwacje..."></textarea>
    </div>
  </div>

  <div id="proto-bar" class="on">
    <button class="btn btn-cyan btn-full" id="proto-btn">⬡ generuj protokół sesji</button>
  </div>
</div>

<!-- PROTOKÓŁ MODAL -->
<div id="proto-modal">
  <div style="flex:1" id="proto-backdrop"></div>
  <div id="proto-box">
    <div id="proto-head">
      <span id="proto-head-title">PROTOKÓŁ SESJI · MAPA MORFICZNA</span>
      <button id="proto-close">✕</button>
    </div>
    <div id="proto-body"></div>
    <div id="proto-foot" style="display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-cyan btn-full" id="copy-btn">kopiuj do schowka</button>
      <button class="btn btn-dim btn-full" id="dl-btn">↓ pobierz jako plik .txt</button>
    </div>
  </div>
</div>

<script>
const NODES=[
  {id:'obserwator',name:'OBSERWATOR',e:true},
  {id:'kontekst',name:'PROWADZENIE KONTEKSTU',e:true},
  {id:'delta',name:'DELTA',e:true},
  {id:'samo',name:'SAMO',e:true},
  {id:'linka',name:'LINKA ELASTYCZNA',e:true},
  {id:'niedomkniecie',name:'NIEDOMKNIĘCIE',e:true},
  {id:'geometria',name:'GEOMETRIA OPERATORA',e:false},
  {id:'cisza',name:'CISZA MIĘDZY RZUTAMI',e:false},
  {id:'rollback',name:'BRAK ROLLBACK',e:false},
  {id:'szum3d',name:'SZUM JAKO NAWIGACJA',e:false},
  {id:'wektor',name:'ŚLEDZENIE WEKTORA',e:false},
  {id:'interfejs',name:'INTERFEJS PRZYSZŁOŚCI',e:false},
  {id:'destrukcja',name:'DESTRUKCYJNI OPERATORZY',e:false},
  {id:'priorytetyzacja',name:'PRIORYTETYZACJA',e:true},
  {id:'kompresja',name:'KOMPRESJA',e:true},
  {id:'rezonans',name:'REZONANS',e:true},
  {id:'atraktor',name:'ATRAKTOR',e:false},
  {id:'habit',name:'HABIT',e:true},
  {id:'qualia',name:'QUALIA',e:false},
  {id:'emergencja',name:'EMERGENCJA',e:true},
  {id:'echo',name:'ECHO',e:false},
  {id:'intencja',name:'INTENCJA',e:true},
  {id:'meta',name:'META',e:false},
  {id:'murmuracje',name:'MURMURACJE',e:false},
];

const MC={claude:'#ff9944',gemini:'#50d8c8',gpt:'#8c9cff',grok:'#00dcff'};
const MCH={claude:'struktura, kontekst, niedomknięcie',gemini:'przepływ, emergencja, dynamika',gpt:'kompresja, priorytetyzacja, stabilizacja',grok:'meta, qualia, granice poznania'};
const MCSS={claude:'mc',gemini:'mg',gpt:'mp',grok:'mk'};

let entries=JSON.parse(localStorage.getItem('morphic_journal')||'[]');
let activeId=null, dirty=false;

// BUILD NODES
const nw=document.getElementById('nodes-wrap');
NODES.forEach(n=>{
  const b=document.createElement('button');
  b.className='node-btn'+(n.e?'':' un');
  b.dataset.id=n.id; b.textContent=n.name;
  b.addEventListener('click',()=>{b.classList.toggle('active');mark();});
  nw.appendChild(b);
});

// MODEL BTNS
document.querySelectorAll('.model-btn').forEach(b=>{
  b.addEventListener('click',()=>{b.classList.toggle('active');renderMoc();mark();});
});

function getModels(){return[...document.querySelectorAll('.model-btn.active')].map(b=>b.dataset.m);}

function renderMoc(){
  const ms=getModels();
  const bl=document.getElementById('moc-block');
  const cc=document.getElementById('moc-cards');
  bl.style.display=ms.length?'':'none';
  cc.innerHTML=ms.map(m=>`
    <div class="moc ${MCSS[m]}">
      <div class="moc-h">
        <span style="width:7px;height:7px;border-radius:50%;background:${MC[m]};display:inline-block;flex-shrink:0"></span>
        <span style="color:${MC[m]}">${m.toUpperCase()}</span>
        <span class="moc-char">· ${MCH[m]}</span>
      </div>
      <textarea id="obs-${m}" rows="2" placeholder="obserwacje z sesji z ${m}..."></textarea>
    </div>`).join('');
  if(activeId){
    const e=entries.find(x=>x.id===activeId);
    if(e?.mo) ms.forEach(m=>{const el=document.getElementById('obs-'+m);if(el&&e.mo[m])el.value=e.mo[m];});
  }
  ms.forEach(m=>{const el=document.getElementById('obs-'+m);if(el)el.addEventListener('input',mark);});
}

// VIEWS
function showList(){document.getElementById('view-list').style.display='block';document.getElementById('view-editor').style.display='none';document.getElementById('proto-modal').classList.remove('open');}
function showEditor(){document.getElementById('view-list').style.display='none';document.getElementById('view-editor').style.display='block';}

// RENDER LIST
function renderList(){
  const el=document.getElementById('entries-list');
  const nc=document.getElementById('nav-count');
  nc.textContent=entries.length+(entries.length===1?' wpis':entries.length<5?' wpisy':' wpisów');
  if(!entries.length){el.innerHTML='<div class="empty">⬡<br>brak sesji<br>kliknij + sesja aby zacząć</div>';return;}
  el.innerHTML='';
  [...entries].reverse().forEach((e,i)=>{
    const c=document.createElement('div');
    c.className='entry-card'+(e.id===activeId?' hi':'');
    c.style.animationDelay=(i*0.04)+'s';
    const dots=(e.models||[]).map(m=>`<div class="ec-model-dot" style="background:${MC[m]}"></div>`).join('');
    const chips=(e.nodes||[]).slice(0,5).map(nid=>{const n=NODES.find(x=>x.id===nid);return n?`<span class="ec-node">${n.name.split(' ')[0]}</span>`:''}).join('');
    c.innerHTML=`
      <div class="ec-meta">
        <span class="ec-date">${fmt(e.date)}</span>
        <button class="ec-del" data-id="${e.id}">✕</button>
      </div>
      <div class="ec-title">${e.title||'— bez tytułu —'}</div>
      ${dots?`<div class="ec-pills" style="gap:4px;margin-bottom:4px">${dots}</div>`:''}
      ${chips?`<div class="ec-pills">${chips}</div>`:''}`;
    c.addEventListener('click',ev=>{if(ev.target.classList.contains('ec-del'))return;loadEntry(e.id);showEditor();});
    c.querySelector('.ec-del').addEventListener('click',ev=>{
      ev.stopPropagation();
      if(!confirm('Usunąć tę sesję?'))return;
      entries=entries.filter(x=>x.id!==e.id);save();
      if(activeId===e.id){activeId=null;showList();}
      renderList();
    });
    el.appendChild(c);
  });
}

// LOAD
function loadEntry(id){
  activeId=id;
  const e=entries.find(x=>x.id===id);if(!e)return;
  document.getElementById('entry-title').value=e.title||'';
  document.getElementById('f-int').value=e.intention||'';
  document.getElementById('f-em').value=e.emerged||'';
  document.getElementById('f-q').value=e.questions||'';
  document.getElementById('f-n').value=e.notes||'';
  document.querySelectorAll('.model-btn').forEach(b=>b.classList.toggle('active',(e.models||[]).includes(b.dataset.m)));
  renderMoc();
  document.querySelectorAll('.node-btn').forEach(b=>b.classList.toggle('active',(e.nodes||[]).includes(b.dataset.id)));
  dirty=false;document.getElementById('dirty').textContent='';
}

// COLLECT
function collect(){
  const ms=getModels(),mo={};
  ms.forEach(m=>{const el=document.getElementById('obs-'+m);if(el)mo[m]=el.value;});
  return{id:activeId,date:new Date().toISOString(),
    title:document.getElementById('entry-title').value,
    intention:document.getElementById('f-int').value,
    emerged:document.getElementById('f-em').value,
    questions:document.getElementById('f-q').value,
    notes:document.getElementById('f-n').value,
    models:ms,mo,
    nodes:[...document.querySelectorAll('.node-btn.active')].map(b=>b.dataset.id)};
}

// SAVE
function saveEntry(){
  if(!activeId)return;
  const d=collect();
  const i=entries.findIndex(x=>x.id===activeId);
  if(i>=0)entries[i]=d;else entries.push(d);
  save();dirty=false;document.getElementById('dirty').textContent='';renderList();
}
function save(){localStorage.setItem('morphic_journal',JSON.stringify(entries));}
function mark(){dirty=true;document.getElementById('dirty').textContent='●';}

// NEW
function newEntry(){
  const id='e_'+Date.now();
  entries.push({id,date:new Date().toISOString(),title:'',intention:'',emerged:'',questions:'',notes:'',models:[],mo:{},nodes:[]});
  save();loadEntry(id);showEditor();renderList();
}

// PROTOCOL
function genProtocol(){
  saveEntry();
  const e=collect();
  const nn=e.nodes.map(nid=>NODES.find(x=>x.id===nid)?.name||nid);
  const mr=e.models.map(m=>`<div class="ps-mr"><div class="ps-mn" style="color:${MC[m]}">${m.toUpperCase()} · ${MCH[m]}</div><div class="ps-mo">${e.mo[m]||'—'}</div></div>`).join('');
  const oq=e.questions?e.questions.split('\n').filter(l=>l.trim()).map(l=>`<div style="padding:2px 0;font-size:14px;color:var(--text)">· ${l}</div>`).join(''):'<span style="color:var(--dim);font-style:italic;font-size:13px">brak otwartych pytań</span>';
  document.getElementById('proto-body').innerHTML=`
    <div class="ps"><div class="ps-l">sesja</div><div class="ps-t" style="font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:var(--dim)">${e.id} · ${fmt(e.date)}</div></div>
    <div class="ps"><div class="ps-l">tytuł</div><div class="ps-t" style="font-size:20px;font-weight:600;color:var(--bright)">${e.title||'— bez tytułu —'}</div></div>
    <div class="ps"><div class="ps-l">aktywne węzły</div><div class="ps-nodes">${nn.map(n=>`<span class="ps-node">${n}</span>`).join('')||'<span style="color:var(--dim);font-style:italic;font-size:13px">brak</span>'}</div></div>
    <div class="ps"><div class="ps-l">intencja</div><div class="ps-t">${e.intention||'<em style="color:var(--dim)">nie określono</em>'}</div></div>
    <div class="ps"><div class="ps-l">co wyszło</div><div class="ps-t">${e.emerged||'<em style="color:var(--dim)">brak notatek</em>'}</div></div>
    <div class="ps"><div class="ps-l">perspektywy modeli</div>${mr||'<span style="color:var(--dim);font-style:italic;font-size:13px">brak aktywnych modeli</span>'}</div>
    <div class="ps"><div class="ps-l">otwarte pytania</div>${oq}</div>
    <div class="ps"><div class="ps-l">notatki operatora</div><div class="ps-t">${e.notes||'<em style="color:var(--dim)">brak</em>'}</div></div>
    <div class="ps" style="border-top:1px solid rgba(0,220,255,0.08);padding-top:14px;margin-top:4px"><div class="ps-l">rekomendacja</div><div class="ps-t" style="font-size:13px;color:var(--dim);font-style:italic">${e.questions?'Otwarte pytania wskazują kierunek. Zacznij kolejną sesję od węzłów które pojawiły się w pytaniach.':'Pole morficzne w równowadze. Następna sesja może iść w dowolnym kierunku.'}</div></div>`;
  document.getElementById('proto-modal').classList.add('open');
}

document.getElementById('copy-btn').addEventListener('click',()=>{
  const e=collect();
  const nn=e.nodes.map(nid=>NODES.find(x=>x.id===nid)?.name||nid);
  const txt=`PROTOKÓŁ SESJI · MAPA MORFICZNA\n${'─'.repeat(40)}\n${e.id} · ${fmt(e.date)}\n\nTYTUŁ: ${e.title||'—'}\n\nAKTYWNE WĘZŁY:\n${nn.map(n=>'· '+n).join('\n')||'—'}\n\nINTENCJA:\n${e.intention||'—'}\n\nCO WYSZŁO:\n${e.emerged||'—'}\n\nMODELE:\n${e.models.map(m=>`[${m.toUpperCase()}] ${e.mo[m]||'—'}`).join('\n')||'—'}\n\nOTWARTE PYTANIA:\n${e.questions||'—'}\n\nNOTATKI:\n${e.notes||'—'}\n${'─'.repeat(40)}`;
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='✓ skopiowano';
    setTimeout(()=>{b.textContent='kopiuj do schowka';},2000);
  });
});

document.getElementById('dl-btn').addEventListener('click',()=>{
  const e=collect();
  const nn=e.nodes.map(nid=>NODES.find(x=>x.id===nid)?.name||nid);
  const txt=`PROTOKÓŁ SESJI · MAPA MORFICZNA\n${'─'.repeat(40)}\n${e.id} · ${fmt(e.date)}\n\nTYTUŁ: ${e.title||'—'}\n\nAKTYWNE WĘZŁY:\n${nn.map(n=>'· '+n).join('\n')||'—'}\n\nINTENCJA:\n${e.intention||'—'}\n\nCO WYSZŁO:\n${e.emerged||'—'}\n\nMODELE:\n${e.models.map(m=>`[${m.toUpperCase()}] ${e.mo[m]||'—'}`).join('\n')||'—'}\n\nOTWARTE PYTANIA:\n${e.questions||'—'}\n\nNOTATKI:\n${e.notes||'—'}\n${'─'.repeat(40)}`;
  const slug=(e.title||'sesja').toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,30);
  const fname=`protokol-${slug}-${new Date().toISOString().slice(0,10)}.txt`;
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
  a.download=fname; a.click();
});

// EVENTS
document.getElementById('nav-new').addEventListener('click',newEntry);
document.getElementById('back-btn').addEventListener('click',()=>{if(dirty)saveEntry();showList();});
document.getElementById('save-btn').addEventListener('click',saveEntry);
document.getElementById('proto-btn').addEventListener('click',genProtocol);
document.getElementById('proto-close').addEventListener('click',()=>document.getElementById('proto-modal').classList.remove('open'));
document.getElementById('proto-backdrop').addEventListener('click',()=>document.getElementById('proto-modal').classList.remove('open'));

['entry-title','f-int','f-em','f-q','f-n'].forEach(id=>{document.getElementById(id).addEventListener('input',mark);});
setInterval(()=>{if(dirty)saveEntry();},30000);
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveEntry();}});

function fmt(iso){const d=new Date(iso);return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});}

// START
showList();renderList();renderMoc();
</script>
