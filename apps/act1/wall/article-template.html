<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · Wall · AiWhisperers</title>
<meta name="description" content="{{DESCRIPTION}}">
<meta name="robots" content="index,follow">
<link rel="canonical" href="{{CANONICAL_URL}}">
{{ALTERNATE_LINKS}}
<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{CANONICAL_URL}}">
<meta property="og:site_name" content="AiWhisperers · Wall">
<meta property="og:locale" content="{{OG_LOCALE}}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{DESCRIPTION}}">
<script type="application/ld+json">{{JSON_LD}}</script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #050410; --deep2: #07080f;
  --gold: #e8c878; --gold-soft: #a88850; --gold-dim: rgba(232,200,120,0.12);
  --stone: #c8beac; --stone-dim: rgba(200,190,170,0.15);
  --ink: #f0e8d8; --ink-dim: rgba(240,232,216,0.55); --ink-faint: rgba(240,232,216,0.22);
  --border: rgba(240,232,216,0.08);
  --red: rgba(200,80,80,.85);
  --mono: 'JetBrains Mono', monospace;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; background: var(--deep); color: var(--ink); font-family: var(--serif); -webkit-font-smoothing: antialiased; }
body {
  background:
    radial-gradient(ellipse 55% 35% at 30% 20%, rgba(180,170,150,0.08), transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 80%, rgba(232,200,120,0.06), transparent 70%),
    var(--deep);
}

/* ── HUD ── */
.hud-top{position:fixed;top:0;left:0;right:0;z-index:500;height:76px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;gap:0;background:linear-gradient(180deg,rgba(5,4,16,.94) 0%,rgba(5,4,16,0) 100%);backdrop-filter:blur(4px);border-bottom:1px solid rgba(232,200,120,.06);}
.hud-l,.hud-r{display:flex;align-items:center;gap:6px;overflow:hidden;min-width:0;}
.hud-r{justify-content:flex-end;}
.hud-c{text-align:center;padding:0 12px;}
.hud-brand{font-family:var(--sans);font-size:9px;font-weight:500;color:rgba(232,200,120,.45);letter-spacing:.5em;text-transform:uppercase;line-height:1;}
.hud-mod{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-top:5px;line-height:1;}
.hud-sub{font-family:var(--serif);font-size:11px;font-style:italic;color:rgba(200,180,140,.4);letter-spacing:.04em;margin-top:4px;line-height:1;}
.hud-btn{background:transparent;border:1px solid rgba(232,200,120,.15);color:rgba(240,232,216,.5);font-family:var(--mono);font-size:8.5px;letter-spacing:.25em;text-transform:uppercase;padding:8px 12px;cursor:pointer;text-decoration:none;transition:all .25s;display:inline-flex;align-items:center;line-height:1;}
.hud-btn:hover{border-color:rgba(232,200,120,.5);color:var(--gold);background:rgba(232,200,120,.04);}
.hud-bot{position:fixed;bottom:0;left:0;right:0;z-index:500;height:28px;display:flex;align-items:center;justify-content:center;background:linear-gradient(0deg,rgba(5,4,16,.88) 0%,rgba(5,4,16,0) 100%);backdrop-filter:blur(2px);border-top:1px solid rgba(232,200,120,.03);}
.hud-bot-meta{font-family:var(--mono);font-size:7px;letter-spacing:.2em;color:rgba(240,232,216,.15);text-transform:uppercase;}

/* ── LAYOUT ── */
.article-wrap{max-width:760px;margin:0 auto;padding:108px 32px 100px;position:relative;z-index:1;}
.article-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.article-date{font-family:var(--mono);font-size:8px;color:var(--gold-soft);letter-spacing:.1em;text-transform:uppercase;}
.article-cat{font-family:var(--mono);font-size:8px;color:var(--text-d,rgba(240,232,216,.3));letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--border);padding:2px 7px;}
.article-body{font-family:var(--serif);font-size:15px;line-height:1.85;color:var(--ink-dim);}
.article-body h1{font-family:var(--serif);font-weight:300;font-size:30px;letter-spacing:1px;color:var(--gold);margin:0 0 18px;line-height:1.25;}
.article-body h2{font-family:var(--sans);font-weight:700;font-size:16px;color:var(--ink);margin:26px 0 10px;}
.article-body h3{font-family:var(--sans);font-weight:700;font-size:13px;color:var(--ink-dim);margin:20px 0 8px;}
.article-body p{margin:0 0 16px;}
.article-body strong{color:var(--ink);font-weight:600;}
.article-body em{color:rgba(200,180,140,.75);}
.article-body code{font-family:var(--mono);font-size:12px;color:var(--gold-soft);background:rgba(232,200,120,.06);padding:1px 5px;}
.article-body a{color:var(--gold-soft);text-decoration:underline;text-decoration-color:rgba(232,200,120,.3);}
.article-body a:hover{color:var(--gold);}
.article-body hr{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);opacity:.2;margin:26px 0;}
.article-foot{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);}
.lang-alts{font-family:var(--mono);font-size:8px;letter-spacing:.15em;color:var(--ink-faint);text-transform:uppercase;}
.lang-alts a{color:var(--gold-soft);margin-left:6px;}
.lang-alts a:hover{color:var(--gold);}
</style>
</head>
<body>

<header class="hud-top">
  <div class="hud-l">
    <a class="hud-btn" href="{{BACK_TO_ROOT}}">⟵ mapa</a>
  </div>
  <div class="hud-c">
    <div class="hud-brand">AI·WHISPERERS</div>
    <div class="hud-mod">Wall</div>
    <div class="hud-sub">tablica projektu · artykuły i notatki</div>
  </div>
  <div class="hud-r">
    <a class="hud-btn" href="{{BACK_TO_WALL}}">⊞ tablica</a>
  </div>
</header>

<div class="article-wrap">
  <div class="article-meta">
    <span class="article-date">{{DATE}}</span>
    <span class="article-cat">{{CATEGORY_LABEL}}</span>
  </div>
  <div class="article-body">
{{BODY_HTML}}
  </div>
  <div class="article-foot">
    <div class="lang-alts">wersje językowe:{{LANG_LINKS}}</div>
  </div>
</div>

<footer class="hud-bot">
  <span class="hud-bot-meta">Wall · v1.2 · Claude Sonnet 5 · © Denis Czuliński · iFactory5.0 · 2026</span>
</footer>

</body>
</html>
